<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Prompt Library</title>
    <link href="style.css" rel="stylesheet">
</head>
<body class="style">
    <h1>AI Prompt Library</h1>
    <form action="#" method="post">
    <li>
      <label for="msg">Titre :</label>
      <textarea id="msg" name="user_message"></textarea>
    </li>
    <li>
      <label for="msg">Catégorie :</label>
      <textarea id="msg" name="user_message"></textarea>
    </li>
    <li>
      <label for="msg">Prompt :</label>
      <textarea id="msg" name="user_message"></textarea>
    </li>
    <div class="button">
       <button type="submit">Envoyer les infos du prompt</button>
    </div>

    <script>
        const ulElement = document.querySelector("ul");

        fetch("/prompt.json")
            .then((response) => {
            return response.json();
            })
            .then((users) => {
            for (const user of users) {
                const liElement = document.createElement("li");
                liElement.innerText = user.title;
                ulElement.appendChild(liElement);
            }
            });
    </script>


    </form>
</body>
</html>
